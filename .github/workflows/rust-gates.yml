name: rust gates

on:
  push:
    branches: ["wave2/**", "master"]
    paths: ["rust/**", "reference/**", ".gitmodules", ".github/workflows/rust-gates.yml"]
  pull_request:
    paths: ["rust/**", "reference/**", ".gitmodules"]

env:
  CARGO_TERM_COLOR: always

jobs:
  gates:
    name: differential + conformance gates (x86-64)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install toolchain deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q nasm cmake ninja-build dav1d

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build C reference (static, the differential oracle)
        run: |
          cmake -S reference/svt-av1 -B cbuild-static -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OUTPUT_DIRECTORY="$GITHUB_WORKSPACE/Bin/Release/" \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DBUILD_TESTING=OFF -DSVT_AV1_LTO=OFF
          cmake --build cbuild-static

      - name: Cache libaom build (aomdec oracle)
        id: aom-cache
        uses: actions/cache@v4
        with:
          path: aom-build/aomdec
          key: aomdec-v3-${{ runner.os }}

      - name: Build aomdec (reference decoder)
        if: steps.aom-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b v3.12.1 https://aomedia.googlesource.com/aom aom-src
          cmake -S aom-src -B aom-build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCONFIG_AV1_ENCODER=0 -DENABLE_TESTS=0 -DENABLE_EXAMPLES=1 \
            -DENABLE_DOCS=0 -DENABLE_TOOLS=0
          cmake --build aom-build --target aomdec

      - name: Workspace tests (differential parity suites vs C)
        working-directory: rust
        # nextest is the standard runner (faster, per-test isolation). It does
        # not run doctests; the workspace currently has 0 doctests (verified),
        # and `cargo test --doc` below is a guard if any are ever added.
        run: |
          cargo nextest run --workspace --no-fail-fast
          cargo test --workspace --doc

      - name: Decode conformance — mono (aomdec + dav1d)
        working-directory: rust
        run: |
          AOMDEC="$GITHUB_WORKSPACE/aom-build/aomdec" DAV1D="$(command -v dav1d)" \
            ./tools/decode_conformance.sh target/dc-mono

      - name: Decode conformance — 4:2:0 (aomdec + dav1d)
        working-directory: rust
        run: |
          AOMDEC="$GITHUB_WORKSPACE/aom-build/aomdec" DAV1D="$(command -v dav1d)" \
            ./tools/decode_conformance.sh target/dc-chroma chroma

      - name: bd10 identity (uniform, port == real aomenc at bit depth 10)
        working-directory: rust
        run: |
          ./tools/bd10_matrix.sh

      - name: bd10 non-flat identity (u16 MD path, DC-family cells)
        working-directory: rust
        run: |
          AOMDEC="$GITHUB_WORKSPACE/aom-build/aomdec" ./tools/bd10_nonflat_gate.sh

      - name: Recon parity (encoder recon == aomdec output, byte-exact)
        working-directory: rust
        run: |
          AOMDEC="$GITHUB_WORKSPACE/aom-build/aomdec" ./tools/recon_parity.sh

      # Performance ratchet intentionally NOT run here: shared runners are
      # too noisy for the <=1.20x wall-time gate; it runs on the fixed HW
      # matrix (see benchmarks/*.meta for the current measured baselines).
